<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tech Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs"></div>
    <div class="app-container">
        <header>
            <h1>Daily Tech Quiz</h1>
            <div class="progress-container">
                <span id="progress-text">1 / 5</span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
        </header>

        <main>
            <div class="glass-card question-card">
                <span class="category-tag" id="category-tag">Loading...</span>
                <p class="question-text" id="question-text">問題を読み込み中...</p>
            </div>

            <div class="glass-card answer-card hidden" id="answer-card">
                <h3>💡 解答と解説</h3>
                <p class="answer-text" id="answer-text"></p>
                <div style="margin-top: 24px;">
                    <button class="primary-btn next-btn" id="next-btn">次の問題へ ➔</button>
                </div>
            </div>

            <div class="action-area" id="action-area">
                <button class="primary-btn show-answer-btn" id="show-answer-btn">正解を見る</button>
            </div>
            
            <div class="glass-card result-card hidden" id="result-card">
                <h2>🎉 今日の学習完了！</h2>
                <p>よく頑張りました！コツコツ続けることで、確実に知識が定着します。</p>
                <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px;">
                    <button class="primary-btn next-btn" id="review-btn">今日のおさらいをする</button>
                    <button class="primary-btn" onclick="location.reload()">トップに戻る</button>
                </div>
            </div>

            <div class="glass-card review-card hidden" id="review-card">
                <h2>📚 今日のおさらい</h2>
                <div id="review-content"></div>
                <div style="margin-top: 24px;">
                    <button class="primary-btn" onclick="location.reload()">トップに戻る</button>
                </div>
            </div>
        </main>
    </div>
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
